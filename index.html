<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Biblioteca</title>
    <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body>

<header>
    <h1>Sistema Biblioteca</h1>
</header>

<nav>
    <button onclick="mostrarSeccion('usuarios')">Usuarios</button>
    <button onclick="mostrarSeccion('libros')">Libros</button>
    <button onclick="mostrarSeccion('prestamos')">Préstamos</button>
</nav>

<!-- USUARIOS -->
<section id="usuarios" class="seccion">
    <h2>Usuarios</h2>

    <div class="form">
        <input type="text" id="nombre" placeholder="Nombre">
        <input type="text" id="rut" placeholder="RUT">
        <input type="text" id="telefono" placeholder="Teléfono">
        <input type="password" id="contrasena" placeholder="Contraseña">

        <select id="tipo">
            <option value="alumno">Alumno</option>
            <option value="bibliotecario">Bibliotecario</option>
        </select>

        <button onclick="agregarUsuario()">Agregar usuario</button>
    </div>

    <table>
        <thead>
            <tr>
                <th>Nombre</th>
                <th>RUT</th>
                <th>Teléfono</th>
            </tr>
        </thead>
        <tbody id="tablaUsuarios"></tbody>
    </table>
</section>

<!-- LIBROS -->
<section id="libros" class="seccion oculto">
    <h2>Libros</h2>

    <div class="form">
        <input type="text" id="titulo" placeholder="Título">
        <input type="text" id="autor" placeholder="Autor">
        <button onclick="agregarLibro()">Agregar libro</button>
    </div>

    <table>
        <thead>
            <tr>
                <th>Título</th>
                <th>Autor</th>
            </tr>
        </thead>
        <tbody id="tablaLibros"></tbody>
    </table>
</section>

<!-- PRÉSTAMOS -->
<section id="prestamos" class="seccion oculto">
    <h2>Préstamos</h2>

    <div class="form">
        <input type="number" id="idusuario" placeholder="ID Usuario">
        <input type="number" id="idlibro" placeholder="ID Libro">
        <input type="date" id="fecha">
        <button onclick="agregarPrestamo()">Registrar préstamo</button>
    </div>

    <table>
        <thead>
            <tr>
                <th>ID Usuario</th>
                <th>ID Libro</th>
                <th>Fecha</th>
            </tr>
        </thead>
        <tbody id="tablaPrestamos"></tbody>
    </table>
</section>

<script src="assets/js/script.js"></script>

</body>
</html>
