<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Biblioteca Sistema</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>

<header>
    <h2>📚 Sistema Biblioteca</h2>
    <button onclick="toggleMenu()">☰</button>
    <nav id="menu">
        <a onclick="show('usuarios')">Usuarios</a>
        <a onclick="show('libros')">Libros</a>
        <a onclick="show('prestamos')">Préstamos</a>
        <a onclick="show('devoluciones')">Devoluciones</a>
        <a onclick="show('multas')">Multas</a>
    </nav>
</header>

<div class="container">

<!-- USUARIO -->
<div id="usuarios" class="sec">
<h2>Usuarios</h2>

<input id="nombre" placeholder="Nombre">
<input id="apellido" placeholder="Apellido">
<input id="rut" placeholder="RUT">
<input id="telefono" placeholder="Teléfono">
<input id="correo" placeholder="Correo">
<input id="password" placeholder="Password">

<button onclick="addUsuario()">Agregar</button>

<table id="tablaUsuarios"></table>
</div>

<!-- LIBROS -->
<div id="libros" class="sec" style="display:none;">
<h2>Libros</h2>

<input id="titulo" placeholder="Título">
<input id="autor" placeholder="Autor">
<input id="categoria" placeholder="Categoría">
<input id="editorial" placeholder="Editorial">
<input id="anio" placeholder="Año">
<button onclick="addLibro()">Agregar</button>

<table id="tablaLibros"></table>
</div>

<!-- PRESTAMOS -->
<div id="prestamos" class="sec" style="display:none;">
<h2>Préstamos</h2>

<input id="p_usuario" placeholder="ID Usuario">
<input id="p_libro" placeholder="ID Libro">
<button onclick="addPrestamo()">Crear</button>

<ul id="listaPrestamos"></ul>
</div>

<!-- DEVOLUCIONES -->
<div id="devoluciones" class="sec" style="display:none;">
<h2>Devoluciones</h2>

<input id="d_condicion" placeholder="Condición">
<button onclick="addDevolucion()">Registrar</button>

<ul id="listaDevoluciones"></ul>
</div>

<!-- MULTAS -->
<div id="multas" class="sec" style="display:none;">
<h2>Multas</h2>

<input id="m_monto" placeholder="Monto">
<input id="m_dias" placeholder="Días atraso">
<button onclick="addMulta()">Agregar</button>

<ul id="listaMultas"></ul>
</div>

</div>

<script src="script.js"></script>
</body>
</html>
